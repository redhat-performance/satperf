---
- name: "Configure capsule(s)"
  hosts: capsules
  gather_facts: false

  pre_tasks:
    - name: Convert storage_pools to native type
      ansible.builtin.set_fact:
        storage_pools: "{{ storage_pools | from_yaml }}"
      when: storage_pools is string

  roles:
    - role: linux-system-roles.firewall
    - role: linux-system-roles.storage
    - role: ../common/roles/enlarge-arp-table
    - role: repo_setup
    - role: capsule
    - role: capsule-location
    - role: puppet-autosign
...
