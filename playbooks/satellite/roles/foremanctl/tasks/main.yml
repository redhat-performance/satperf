---
- name: Requirements
  block:
    - name: EL 9 COPR
      when:
        - ansible_facts['distribution_major_version'] | int == 9
        - (product is defined and product == 'foreman') or foremanctl_deployment_type == 'proxy'
      block:

        - name: Enable Foreman develop COPR
          community.general.copr:
            name: "@theforeman/develop"
            chroot: "rhel-{{ ansible_facts['distribution_major_version'] }}-x86_64"

    - name: EL 10 COPR
      when:
        - ansible_facts['distribution_major_version'] | int == 10
      block:
        - name: Enable foremanctl COPR
          community.general.copr:
            name: "ekohl/foreman-nightly-staging"
            chroot: "rhel-{{ ansible_facts['distribution_major_version'] }}-x86_64"

    - name: Satellite
      when:
        - product is not defined or product == 'satellite'
      block:
        - name: Setup Satellite repositories
          ansible.builtin.include_role:
            name: repo_setup
          vars:
            sat_version: 'stream'

- name: Install foremanctl package
  ansible.builtin.dnf:
    name: foremanctl
    state: latest

- name: Use code from git
  when:
    - use_git is defined and use_git | bool
  block:
    - name: Set required variable(s) values
      ansible.builtin.set_fact:
        foremanctl_organization: "{{ organization | default('theforeman') }}"

    - name: Clone foremanctl git repo # noqa: latest[git]
      ansible.builtin.git:
        repo: "{{ foremanctl_forge }}/{{ foremanctl_organization }}/{{ foremanctl_repo }}.git"
        dest: /tmp/foremanctl
        version: "{{ version | default(omit) }}"
        force: true

    - name: Apply PRs
      when:
        - apply_prs is defined
        - apply_prs is string or apply_prs.targets | default([]) | length > 0
      ansible.builtin.include_role:
        name: apply_prs

    - name: Move the original src directory
      ansible.builtin.copy:
        src: /usr/share/foremanctl/src/
        dest: /usr/share/foremanctl/src.orig/
        mode: 'preserve'
        remote_src: true

    - name: Remove original src directory
      ansible.builtin.file:
        path: /usr/share/foremanctl/src/
        state: absent

    - name: Copy the src directory from the git clone
      ansible.builtin.copy:
        src: /tmp/foremanctl/src/
        dest: /usr/share/foremanctl/src/
        mode: 'preserve'
        remote_src: true

    # XXX: Hack!!!
    - name: Install foremanctl Ansible collections from src
      when:
        - ansible_facts['distribution_major_version'] | int == 10
      ansible.builtin.command:
        cmd: >-
          ansible-galaxy collection install
          -r /usr/share/foremanctl/src/requirements.yml
          -p /usr/share/foremanctl/collections/ansible_collections
      changed_when: true

- name: Log in to the registry
  containers.podman.podman_login:
    registry: "{{ registry }}"
    username: "{{ registry_username }}"
    password: "{{ registry_password }}"
    authfile: /etc/foreman/registry-auth.json
  when:
    - registry is defined and registry != "quay.io"
    - registry_username is defined and registry_username | length > 0
    - registry_password is defined and registry_password | length > 0

- name: Override images vars file
  ansible.builtin.include_role:
    name: override_images
  when:
    - override_images_content_file is defined and override_images_content_file | length > 0

- name: Show images.yml content
  ansible.builtin.slurp:
    src: /usr/share/foremanctl/src/vars/images.yml
  register: _foremanctl_images_yml

- name: Display images.yml
  ansible.builtin.debug:
    msg: "{{ (_foremanctl_images_yml.content | b64decode).split('\n') }}"

- name: Set deployer command
  ansible.builtin.set_fact:
    _foremanctl_deployer: foremanctl

- name: Pull images
  when:
    - foremanctl_deployment_type == 'server'
  block:
    - name: Set command line to pull images
      ansible.builtin.set_fact:
        _foremanctl_pull_images_cmd: "{{ _foremanctl_deployer }} pull-images"

    - name: Show command line to pull images
      ansible.builtin.debug:
        msg: "{{ _foremanctl_pull_images_cmd }}"

    - name: Pull images
      ansible.builtin.command:
        cmd: "{{ _foremanctl_pull_images_cmd }}"
      register: _foremanctl_pull_images_cmd_out
      # XXX: Ignore errors in order to be able to show `_foremanctl_pull_images_cmd_out.stdout_lines`
      ignore_errors: true
      changed_when: true

    - name: Show pull images output
      ansible.builtin.debug:
        var: _foremanctl_pull_images_cmd_out.stdout_lines
      failed_when:
        - _foremanctl_pull_images_cmd_out is failed

    - name: Show pull images error output
      ansible.builtin.debug:
        var: _foremanctl_pull_images_cmd_out.stderr_lines
      failed_when:
        - _foremanctl_pull_images_cmd_out is failed

- name: Set command line to deploy
  ansible.builtin.set_fact:
    _foremanctl_deploy_cmd: "{{ _foremanctl_deployer }} deploy"

- name: Foreman server deployment
  when:
    - foremanctl_deployment_type == 'server'
  block:
    - name: Initial deployment
      block:
        - name: Set basic deployment command line
          ansible.builtin.set_fact:
            _foremanctl_initial_deploy_cmd: >-
              {{ _foremanctl_deploy_cmd }}
              --initial-admin-password {{ password | default(foreman_password) }}

        - name: Show deployment command line
          ansible.builtin.debug:
            msg: "{{ _foremanctl_initial_deploy_cmd }}"

        - name: Run deployment
          ansible.builtin.command:
            cmd: "{{ _foremanctl_initial_deploy_cmd }}"
          register: _foremanctl_initial_deploy_cmd_out
          # XXX: Ignore errors in order to be able to show `_foremanctl_initial_deploy_cmd_out.stdout_lines`
          ignore_errors: true
          changed_when: true

        - name: Show deployment output
          ansible.builtin.debug:
            var: _foremanctl_initial_deploy_cmd_out.stdout_lines
          failed_when:
            - _foremanctl_initial_deploy_cmd_out is failed

        - name: Show deployment error output
          ansible.builtin.debug:
            var: _foremanctl_initial_deploy_cmd_out.stderr_lines
          failed_when:
            - _foremanctl_initial_deploy_cmd_out is failed

        - name: Calculate deployment duration
          ansible.builtin.set_fact:
            _foremanctl_deploy_duration: >-
              {{ (_foremanctl_initial_deploy_cmd_out.end | to_datetime('%Y-%m-%d %H:%M:%S.%f')).timestamp()
                 - (_foremanctl_initial_deploy_cmd_out.start | to_datetime('%Y-%m-%d %H:%M:%S.%f')).timestamp() }}

        - name: Show deployment duration
          ansible.builtin.debug:
            msg: >-
              ForemanctlDeploy {{ _foremanctl_initial_deploy_cmd_out.start }}
              to {{ _foremanctl_initial_deploy_cmd_out.end }}
              taking {{ _foremanctl_deploy_duration }} seconds

    - name: Add features
      block:
        - name: Add iop to features if enabled
          ansible.builtin.set_fact:
            foremanctl_features: "{{ foremanctl_features + ['iop'] }}"
          when: enable_iop | default(false) | bool

        - name: Foreman
          when:
            - product is defined and product == 'foreman'
          block:
            - name: Setup Foreman repositories for hammer
              ansible.builtin.include_role:
                name: theforeman.operations.foreman_repositories
              vars:
                foreman_repositories_version: nightly
                foreman_repositories_katello_version: nightly
              when: "'hammer' in foremanctl_features"

        - name: Set features deployment command line
          ansible.builtin.set_fact:
            _foremanctl_add_features_cmd: >-
              {{ _foremanctl_deploy_cmd }}
              {{ foremanctl_features | map('regex_replace', '^(.+)$', '--add-feature \1') | join(' ') }}

        - name: Show features deployment command line
          ansible.builtin.debug:
            msg: "{{ _foremanctl_add_features_cmd }}"

        - name: Run features deployment
          ansible.builtin.command:
            cmd: "{{ _foremanctl_add_features_cmd }}"
          register: _foremanctl_add_features_cmd_out
          # XXX: Ignore errors in order to be able to show `_foremanctl_add_features_cmd_out.stdout_lines`
          ignore_errors: true
          changed_when: true

        - name: Show features deployment output
          ansible.builtin.debug:
            var: _foremanctl_add_features_cmd_out.stdout_lines
          failed_when:
            - _foremanctl_add_features_cmd_out is failed

        - name: Show features deployment error output
          ansible.builtin.debug:
            var: _foremanctl_add_features_cmd_out.stderr_lines
          failed_when:
            - _foremanctl_add_features_cmd_out is failed

        - name: Foreman
          when:
            - product is defined and product == 'foreman'
          block:
            - name: Disable Foreman repositories
              ansible.builtin.dnf:
                name: foreman-release
                state: absent
              when: "'hammer' in foremanctl_features"

- name: Foreman smart proxy deployment
  when:
    - foremanctl_deployment_type == 'proxy'
  block:
    - name: Assert required proxy deployment facts
      ansible.builtin.assert:
        that:
          - groups['satellite6'] is defined and groups['satellite6'] | length > 0

    - name: Set command line to deploy proxy
      ansible.builtin.set_fact:
        _foremanctl_deploy_proxy_cmd: "{{ _foremanctl_deployer }} deploy-proxy"

    - name: Generate proxy certificate bundle on the Foreman server
      throttle: 1
      delegate_to: "{{ groups['satellite6'] | first }}"
      block:
        - name: Set certificate bundle command line
          ansible.builtin.set_fact:
            _foremanctl_certificate_bundle_cmd: >-
              {{ _foremanctl_deployer }} certificate-bundle {{ inventory_hostname }}

        - name: Show certificate bundle command line
          ansible.builtin.debug:
            msg: "{{ _foremanctl_certificate_bundle_cmd }}"

        - name: Generate certificate bundle
          ansible.builtin.command:
            cmd: "{{ _foremanctl_certificate_bundle_cmd }}"
          register: _foremanctl_certificate_bundle_cmd_out
          ignore_errors: true
          changed_when: true

        - name: Show certificate bundle output
          ansible.builtin.debug:
            var: _foremanctl_certificate_bundle_cmd_out.stdout_lines
          failed_when:
            - _foremanctl_certificate_bundle_cmd_out is failed

        - name: Show certificate bundle error output
          ansible.builtin.debug:
            var: _foremanctl_certificate_bundle_cmd_out.stderr_lines
          failed_when:
            - _foremanctl_certificate_bundle_cmd_out is failed

        - name: Read generated certificate bundle
          ansible.builtin.slurp:
            src: "{{ foremanctl_proxy_certificate_bundle_source_path }}"
          register: _foremanctl_proxy_certificate_bundle

    - name: Copy certificate bundle to proxy host
      ansible.builtin.copy:
        content: "{{ _foremanctl_proxy_certificate_bundle.content | b64decode }}"
        dest: "{{ foremanctl_proxy_certificate_bundle_dest_path }}"
        mode: '0600'

    # XXX: Hack
    - name: Ensure proxy inventory target exists
      ansible.builtin.blockinfile:
        path: /etc/foremanctl/inventory
        marker: "# {mark} foremanctl proxy target"
        block: |
          [proxy]
          localhost ansible_connection=local

    # XXX: Hack
    - name: Resolve Foreman OAuth credentials for proxy deployment
      no_log: true
      block:
        - name: Read Foreman OAuth consumer key from server
          delegate_to: "{{ groups['satellite6'] | first }}"
          ansible.builtin.slurp:
            src: "{{ foremanctl_oauth_consumer_key_file }}"
          register: _foremanctl_proxy_oauth_consumer_key_file
          when:
            - foremanctl_proxy_oauth_consumer_key is not defined

        - name: Read Foreman OAuth consumer secret from server
          delegate_to: "{{ groups['satellite6'] | first }}"
          ansible.builtin.slurp:
            src: "{{ foremanctl_oauth_consumer_secret_file }}"
          register: _foremanctl_proxy_oauth_consumer_secret_file
          when:
            - foremanctl_proxy_oauth_consumer_secret is not defined

        - name: Set proxy OAuth values
          ansible.builtin.set_fact:
            foremanctl_proxy_oauth_consumer_key: >-
              {{ foremanctl_proxy_oauth_consumer_key | default(_foremanctl_proxy_oauth_consumer_key_file.content | b64decode | trim) }}
            foremanctl_proxy_oauth_consumer_secret: >-
              {{ foremanctl_proxy_oauth_consumer_secret | default(_foremanctl_proxy_oauth_consumer_secret_file.content | b64decode | trim) }}

    # XXX: Hack
    - name: Transfer Foreman OAuth credentials to proxy host
      no_log: true
      block:
        - name: Ensure foremanctl state directories exist for proxy OAuth files
          ansible.builtin.file:
            path: "{{ item }}"
            state: directory
            mode: '0700'
          loop: >-
            {{
              [
                foremanctl_proxy_oauth_consumer_key_dest_file | dirname,
                foremanctl_proxy_oauth_consumer_secret_dest_file | dirname
              ] | unique
            }}

        - name: Copy Foreman OAuth consumer key to proxy host
          ansible.builtin.copy:
            content: "{{ foremanctl_proxy_oauth_consumer_key }}"
            dest: "{{ foremanctl_proxy_oauth_consumer_key_dest_file }}"
            mode: '0600'

        - name: Copy Foreman OAuth consumer secret to proxy host
          ansible.builtin.copy:
            content: "{{ foremanctl_proxy_oauth_consumer_secret }}"
            dest: "{{ foremanctl_proxy_oauth_consumer_secret_dest_file }}"
            mode: '0600'

    - name: Set proxy deployment command line
      no_log: true
      ansible.builtin.set_fact:
        _foremanctl_initial_deploy_proxy_cmd: >-
          {{ _foremanctl_deploy_proxy_cmd }}
          --flavor {{ foremanctl_proxy_flavor }}
          --certificate-bundle {{ foremanctl_proxy_certificate_bundle_dest_path }}
          --foreman-fqdn {{ groups['satellite6'] | first }}
          {{ ('--oauth-consumer-key ' ~ foremanctl_proxy_oauth_consumer_key) if (foremanctl_proxy_oauth_consumer_key is defined and foremanctl_proxy_oauth_consumer_key | length > 0) else '' }}
          {{ ('--oauth-consumer-secret ' ~ foremanctl_proxy_oauth_consumer_secret) if (foremanctl_proxy_oauth_consumer_secret is defined and foremanctl_proxy_oauth_consumer_secret | length > 0) else '' }}
          {{ foremanctl_proxy_extra_args }}

    - name: Set redacted proxy deployment command line
      ansible.builtin.set_fact:
        _foremanctl_deploy_proxy_cmd_redacted: >-
          {{ _foremanctl_deploy_proxy_cmd }}
          --flavor {{ foremanctl_proxy_flavor }}
          --certificate-bundle {{ foremanctl_proxy_certificate_bundle_dest_path }}
          --foreman-fqdn {{ groups['satellite6'] | first }}
          {{ '--oauth-consumer-key [redacted]' if (foremanctl_proxy_oauth_consumer_key is defined and foremanctl_proxy_oauth_consumer_key | length > 0) else '' }}
          {{ '--oauth-consumer-secret [redacted]' if (foremanctl_proxy_oauth_consumer_secret is defined and foremanctl_proxy_oauth_consumer_secret | length > 0) else '' }}
          {{ foremanctl_proxy_extra_args }}

    - name: Show redacted proxy deployment command line
      ansible.builtin.debug:
        msg: "{{ _foremanctl_deploy_proxy_cmd_redacted }}"

    - name: Run proxy deployment
      ansible.builtin.command:
        cmd: "{{ _foremanctl_deploy_proxy_cmd }}"
      register: _foremanctl_deploy_proxy_cmd_out
      ignore_errors: true
      changed_when: true

    - name: Show proxy deployment output
      ansible.builtin.debug:
        var: _foremanctl_deploy_proxy_cmd_out.stdout_lines
      failed_when:
        - _foremanctl_deploy_proxy_cmd_out is failed

    - name: Show proxy deployment error output
      ansible.builtin.debug:
        var: _foremanctl_deploy_proxy_cmd_out.stderr_lines
      failed_when:
        - _foremanctl_deploy_proxy_cmd_out is failed

    - name: Calculate proxy deployment duration
      ansible.builtin.set_fact:
        _foremanctl_deploy_proxy_duration: >-
          {{ (_foremanctl_deploy_proxy_cmd_out.end | to_datetime('%Y-%m-%d %H:%M:%S.%f')).timestamp()
             - (_foremanctl_deploy_proxy_cmd_out.start | to_datetime('%Y-%m-%d %H:%M:%S.%f')).timestamp() }}

    - name: Show proxy deployment duration
      ansible.builtin.debug:
        msg: >-
          ForemanctlDeployProxy {{ _foremanctl_deploy_proxy_cmd_out.start }}
          to {{ _foremanctl_deploy_proxy_cmd_out.end }}
          taking {{ _foremanctl_deploy_proxy_duration }} seconds
