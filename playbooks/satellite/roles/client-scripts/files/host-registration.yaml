---
- hosts: all
  gather_facts: false

  tasks:
    - name: Register
      ansible.builtin.shell:
        cmd: |
          set -o pipefail

          if [[ -f /root/registration.log && ! -f /root/registration.log.orig ]]; then
              cp -p /root/registration.log /root/registration.log.orig
          fi

          /root/host-registration.sh &>/root/registration.log
          ret=$?

          echo '-' >>/root/registration.log
          echo "Return code: $ret" >>/root/registration.log
          echo '-----' >>/root/registration.log

          cat /root/registration.log
          exit $ret
      environment:
        TZ: UTC   # make sure returned times are in UTC
      register: registration
      # XXX: Ignore errors in order to be able to show `registration.stdout_lines`
      ignore_errors: true

    - name: Register - output
      ansible.builtin.debug:
        var: registration.stdout_lines
      vars:
        ### XXX: Remove '^Traceback ' to try to avoid:
        ### "AttributeError: 'SubscriptionManager' object has no attribute 'cp'"" false positives on
        ### RHEL 10 containers.
        # regexp: '^.*(Traceback |curl: |Internal Server Error).*$'
        regexp: '^.*(curl: |Internal Server Error).*$'
      failed_when:
        - registration is failed or registration.stdout | regex_search(regexp, multiline=true)

    - name: Calculate registration duration
      ansible.builtin.set_fact:
        reg_duration: "{{ (registration.end | to_datetime('%Y-%m-%d %H:%M:%S.%f')).timestamp() - (registration.start | to_datetime('%Y-%m-%d %H:%M:%S.%f')).timestamp() }}"

    - name: Register - timings
      ansible.builtin.debug:
        msg: "Register {{ registration.start }} to {{ registration.end }} taking {{ reg_duration }} seconds"

    - name: Configure yggdrasil log-level to debug
      when:
        - registration is succeeded
      block:
        - name: Check if yggdrasil config exists
          ansible.builtin.stat:
            path: /etc/yggdrasil/config.toml
          register: yggdrasil_config_file

        - name: Configure yggdrasil debug logging
          when:
            - yggdrasil_config_file.stat.exists
          block:
            - name: Detect RHEL release
              ansible.builtin.setup:
                filter:
                  - ansible_distribution_major_version

            - name: Set yggdrasil service name
              ansible.builtin.set_fact:
                yggdrasil_service_name: "{{ 'yggdrasil' if ansible_facts['distribution_major_version'] == '10' else 'yggdrasild' }}"

            - name: Check if yggdrasil service is running
              ansible.builtin.systemd:
                name: "{{ yggdrasil_service_name }}"
              register: yggdrasil_service_status
              failed_when: false

            - name: Apply debug configuration
              when:
                - yggdrasil_service_status.status is defined
                - yggdrasil_service_status.status.ActiveState == "active"
              block:
                - name: Set yggdrasil log-level to debug
                  ansible.builtin.lineinfile:
                    path: /etc/yggdrasil/config.toml
                    regexp: '^log-level\s*=\s*".*"'
                    line: 'log-level = "debug"'
                  register: yggdrasil_config

                - name: Restart yggdrasil service
                  ansible.builtin.systemd:
                    name: "{{ yggdrasil_service_name }}"
                    state: restarted
                  when:
                    - yggdrasil_config is changed

    # - name: "Disable insights-client automatic scheduling"
