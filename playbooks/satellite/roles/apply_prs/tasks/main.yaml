---
# Apply a list of PRs/MRs to one or more codebases.
#
# Variables:
#   apply_prs         - dict (or YAML/JSON string) with:
#     method          - 'diff' (default, uses patch -p1) or
#                       'patch' (uses git am, requires git repo)
#     targets         - list of:
#       org           - organization/namespace
#       repo          - repository name
#       base_dir      - filesystem path of the codebase (supports globs)
#       prs           - list of PR/MR numbers
#       forge         - VCS forge base URL (default: https://github.com)
#       exclude_patterns - optional list of filterdiff --exclude patterns
#                          (e.g. ['*/test/*', '*/spec/*']) requires patchutils

- name: Parse apply_prs into _apply_prs (extra_vars cannot be overwritten by set_fact)
  ansible.builtin.set_fact:
    _apply_prs: "{{ apply_prs | from_yaml if apply_prs is string else apply_prs }}"

- name: Set default exclude patterns
  ansible.builtin.set_fact:
    _apply_prs_default_exclude_patterns:
      - '*/test/*'
      - '*/spec/*'

- name: Validate _apply_prs.targets
  ansible.builtin.assert:
    that:
      - _apply_prs.targets is sequence and _apply_prs.targets is not string
      - item.org is defined and item.org | length > 0
      - item.repo is defined and item.repo | length > 0
      - item.base_dir is defined and item.base_dir | length > 0
      - item.prs is defined
      - item.prs is sequence and item.prs is not string
      - item.prs | length > 0
    fail_msg: "Invalid _apply_prs.targets entry: {{ item }}"
  loop: "{{ _apply_prs.targets }}"

- name: Install patchutils (required for filterdiff)
  ansible.builtin.dnf:
    name: patchutils
    state: present
    disable_plugin:
      - foreman-protector
  when: _apply_prs.method | default('diff') == 'diff'

- name: Apply PR
  ansible.builtin.shell:
    cmd: >-
      set -o pipefail

      cd {{ item.0.base_dir }} &&
      curl -L -N -sf
      {{ item.0.forge | default('https://github.com') }}/{{ item.0.org }}/{{ item.0.repo }}/pull/{{ item.1 }}.{{ _apply_prs.method | default('diff') }}
      {% set _excl = item.0.exclude_patterns if 'exclude_patterns' in item.0 else _apply_prs_default_exclude_patterns %}
      {% if _excl | length > 0 %}
      | filterdiff {{ _excl | map('regex_replace', '^(.*)$', '--exclude=\1') | join(' ') }}
      {% endif %}
      | {{ 'git am' if _apply_prs.method | default('diff') == 'patch' else 'patch -b -p1 --forward' }}
  loop: "{{ _apply_prs.targets | subelements('prs') }}"
  loop_control:
    label: "{{ item.0.org }}/{{ item.0.repo }}#{{ item.1 }}"
  register: _apply_pr_result
  changed_when: _apply_pr_result.rc == 0
  failed_when:
    - _apply_pr_result.rc != 0
    - "'Reversed (or previously applied) patch detected' not in _apply_pr_result.stdout"
