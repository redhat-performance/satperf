---
- name: Execute script concurrently on containers - preparation
  hosts: container_hosts
  gather_facts: false
  vars:
    size: 4
    total: 0
    reuse_hosts: false

  tasks:
    - name: Calculate size from total
      when:
        - total | int > 0
      ansible.builtin.set_fact:
        size: >-
          {{
            (((total | int + (groups['container_hosts'] | length) - 1)
              // (groups['container_hosts'] | length) + 3) // 4) * 4
          }}

    - name: Assert size is a multiple of 4 and at least 4
      ansible.builtin.assert:
        that:
          - size | int >= 4
          - size | int % 4 == 0
        fail_msg: >-
          size must be a multiple of 4 (got {{ size }}): containers are
          selected in groups of 4 (2×EL8 + 1×EL9 + 1×EL10)

    - name: Reuse hosts - set containers_used_count to 0
      when:
        - reuse_hosts | default(false) | bool
      ansible.builtin.set_fact:
        containers_used_count: 0

    - name: Check whether we have already used some containers
      when:
        - not reuse_hosts | default(false) | bool
      ansible.builtin.stat:
        path: /root/container-exec-used-count
      register: container_used_count_path

    - name: No containers yet used
      when:
        - not reuse_hosts | default(false) | bool
        - not container_used_count_path.stat.exists
      ansible.builtin.set_fact:
        containers_used_count: 0

    - name: Containers already used
      when:
        - not reuse_hosts | default(false) | bool
        - container_used_count_path.stat.exists
      block:
        - name: Get number of containers already used
          ansible.builtin.command:
            cmd: cat /root/container-exec-used-count
          register: containers_used_count_cmd
          changed_when: false

        - name: Set number of used containers based on file contents
          ansible.builtin.set_fact:
            containers_used_count: "{{ containers_used_count_cmd.stdout }}"

    - name: Set required variables for script execution
      ansible.builtin.set_fact:
        used_count: "{{ (containers_used_count | int / 4) | int }}"
        select_size: "{{ (size | int / 4) | int }}"
        local_inventory: "clients_execution_{{ size }}.ini"

    - name: Generate list of containers we are going to use
      ansible.builtin.shell:
        cmd: |
          set -o pipefail

          used_count={{ used_count }}
          select_size={{ select_size }}

          rm -f {{ local_inventory }}

          for el_version in el8 el9 el10; do
              if [[ "$el_version" == 'el8' ]]; then
                  start_line="$(( used_count * 2 ))"
                  end_line="$(( start_line + ( select_size * 2 ) ))"
              else
                  start_line="$(( used_count ))"
                  end_line="$(( start_line + select_size ))"
              fi

              awk -v EL=$el_version '$0 ~ "^"EL"-" {print $0}' \
                /root/container-ips.shuffled |
                awk -v START_LINE=$start_line -v END_LINE=$end_line \
                'NR > START_LINE && NR <= END_LINE {print $NF}' |
                tee -a {{ local_inventory }}
          done
      register: clients_ini
      changed_when: false

    - name: Set base log name
      ansible.builtin.set_fact:
        clients_yaml_cmd_base: >-
          /root/out-{{
            lookup('pipe', 'date -u -Iseconds') |
            regex_replace('[^A-Za-z0-9-]', '_')
          }}
      run_once: true

    - name: Propagate base log name to all hosts
      ansible.builtin.set_fact:
        clients_yaml_cmd_base: "{{ hostvars[ansible_play_hosts[0]]['clients_yaml_cmd_base'] }}"

    - name: Set script_execution.yaml log name
      ansible.builtin.set_fact:
        clients_yaml_cmd_log: "{{ clients_yaml_cmd_base }}_execution.log"

    - name: Write log path for subsequent plays
      ansible.builtin.copy:
        content: "{{ clients_yaml_cmd_log }}"
        dest: /root/.current_exec_log
        mode: '0644'


- name: Start BPF profiling
  hosts: satellite6:capsules
  gather_facts: false
  vars:
    size: 10
    profile: false
    profile_base_dir: '/root/profile'

  tasks:
    - name: Profile preparation
      when:
        - profile | default(false) | bool
      block:
        - name: Create profiling directory
          ansible.builtin.file:
            path: "{{ profile_base_dir }}"
            state: directory
            mode: '0700'

        - name: Start gathering BPF profile
          ansible.builtin.shell:
            cmd: |
              /usr/share/bcc/tools/profile \
                -adf \
                --stack-storage-size 1638400 \
                >{{ profile_base_dir }}/execution_profile-{{ size }}-{{ inventory_hostname }}.profile-folded
          async: 1800
          poll: 0
          # ignore_errors: true


- name: Execute script concurrently on containers - execution
  hosts: container_hosts
  gather_facts: false
  vars:
    size: 10

  tasks:
    - name: Read log path from file
      ansible.builtin.slurp:
        src: /root/.current_exec_log
      register: log_path_slurp

    - name: Set log path and inventory facts
      ansible.builtin.set_fact:
        clients_yaml_cmd_log: "{{ log_path_slurp.content | b64decode }}"
        local_inventory: "clients_execution_{{ size }}.ini"

    - name: Run script_execution.yaml (log = {{ clients_yaml_cmd_log }})
      ansible.builtin.shell:
        cmd: |
          ansible-playbook \
            --private-key /root/id_rsa_key \
            --forks {{ size }} \
            --inventory {{ local_inventory }} \
            --extra-vars 'script="{{ script }}"' \
            script_execution.yaml |
            tee {{ clients_yaml_cmd_log }}
      ignore_errors: true


- name: Stop BPF profiling and generate flamegraphs
  hosts: satellite6:capsules
  gather_facts: false
  vars:
    size: 10
    profile: false
    profile_base_dir: '/root/profile'
    execution_logs: execution_logs
    execution_profile_img: execution_profile.svg

  tasks:
    - name: Profile stop and flamegraphs generation
      when:
        - profile | default(false) | bool
      ignore_errors: true
      block:
        - name: Kill BPF profile process
          ansible.builtin.command:
            cmd: pkill -SIGINT profile
          register: pkill_result
          failed_when: pkill_result.rc not in [0, 1]

        - name: Convert BPF profile output to image
          ansible.builtin.shell:
            cmd: |
              set -o pipefail

              [[ -s {{ profile_base_dir }}/execution_profile-{{ size }}-{{ inventory_hostname }}.profile-folded ]] || exit 0

              flamegraph.pl \
                --minwidth 5 \
                --width 2500 \
                {{ profile_base_dir }}/execution_profile-{{ size }}-{{ inventory_hostname }}.profile-folded \
                >{{ profile_base_dir }}/execution_profile-{{ size }}-{{ inventory_hostname }}.svg

        - name: Fetch BPF profile image
          ansible.builtin.fetch:
            src: "{{ profile_base_dir }}/execution_profile-{{ size }}-{{ inventory_hostname }}.svg"
            dest: "{{ execution_logs }}/../{{ inventory_hostname }}-{{ execution_profile_img }}"
            flat: true
          failed_when: false


- name: Execute script concurrently on containers - post-execution
  hosts: container_hosts
  gather_facts: false
  vars:
    size: 10
    execution_logs: execution_logs
    reuse_hosts: false

  tasks:
    - name: Read log path from file
      ansible.builtin.slurp:
        src: /root/.current_exec_log
      register: log_path_slurp

    - name: Set log path fact
      ansible.builtin.set_fact:
        clients_yaml_cmd_log: "{{ log_path_slurp.content | b64decode }}"

    - name: Fetch execution logs
      ansible.builtin.fetch:
        src: "{{ clients_yaml_cmd_log }}"
        dest: "{{ execution_logs }}"
      failed_when: false
      ignore_errors: true

    - name: Get execution timings
      ansible.builtin.shell:
        cmd: |
          set -o pipefail

          grep \
            '"msg". "Execute' {{ clients_yaml_cmd_log }} |
            cut -d '"' -f 4
      register: clients_yaml_grepper_timings
      failed_when: clients_yaml_grepper_timings.rc == 2
      changed_when: false

    - name: Append execution timings to central list
      ansible.builtin.set_fact:
        grepper_times: >-
          {{
            grepper_times | default([]) +
            hostvars[item]['clients_yaml_grepper_timings']['stdout_lines']
          }}
      with_items: "{{ ansible_play_batch }}"
      run_once: true

    - name: Show execution timings
      ansible.builtin.debug:
        var: grepper_times
      run_once: true

    - name: Show number of successful execution events
      ansible.builtin.debug:
        var: grepper_times | length
      run_once: true

    - name: Increment number of already used containers
      when:
        - not reuse_hosts | default(false) | bool
      ansible.builtin.shell:
        cmd: |
          current=$(cat /root/container-exec-used-count 2>/dev/null || echo 0)
          echo $(( current + {{ size | int }} )) >/root/container-exec-used-count
      changed_when: true

    - name: Get number of hosts that failed to execute
      ansible.builtin.shell:
        cmd: grep -cw 'failed=1' {{ clients_yaml_cmd_log }}
      register: num_failed_hosts
      failed_when: num_failed_hosts.rc == 2
      changed_when: false

    - name: Show number of hosts that failed to execute
      ansible.builtin.debug:
        msg: "{{ num_failed_hosts.stdout }} host(s) failed to execute the script"
...
