---
- name: "Kill pending tasks"
  hosts: localhost
  gather_facts: false

  module_defaults:
    group/theforeman.foreman.foreman:
      server_url: "{{ foreman_server_url | default(omit) }}"
      username: "{{ foreman_username | default(omit) }}"
      password: "{{ foreman_password | default(omit) }}"
      validate_certs: "{{ foreman_validate_certs | default(omit) }}"
      organization: "{{ foreman_organization }}"

  vars:
    # Operation mode: 'cancel' (default) or 'stop'
    operation: "{{ task_operation | default('cancel') }}"

  tasks:
    - name: Build search query for pending tasks
      ansible.builtin.set_fact:
        task_search_query: >-
          state = running and result = pending
          {%- if task_label is defined and task_label | length > 0 %}
           and label = "{{ task_label }}"
          {%- endif %}
          {%- if task_action is defined and task_action | length > 0  %}
           and action ~ "{{ task_action }}"
          {%- endif %}

    - name: Show search query
      ansible.builtin.debug:
        msg: "Searching for tasks with: {{ task_search_query }}"

    - name: Get pending tasks
      theforeman.foreman.resource_info:
        resource: foreman_tasks
        search: "{{ task_search_query }}"
      register: __pending_tasks

    - name: Show pending tasks found
      ansible.builtin.debug:
        msg:
          - "Found {{ __pending_tasks.resources | length }} pending task(s)"
          - "Operation: {{ operation }}"

    - name: Display tasks to be cancelled/stopped
      ansible.builtin.debug:
        msg:
          - "Task ID: {{ item.id }}"
          - "Label: {{ item.label | default('N/A') }}"
          - "Action: {{ item.action | default('N/A') }}"
          - "Started: {{ item.started_at | default('N/A') }}"
          - "State: {{ item.state }}/{{ item.result }}"
      loop: "{{ __pending_tasks.resources }}"
      loop_control:
        label: "Task {{ item.id }}"

    - name: Bulk cancel/stop pending tasks
      when: __pending_tasks.resources | length > 0
      block:
        - name: Set API endpoint based on operation
          ansible.builtin.set_fact:
            api_endpoint: "{{ 'bulk_cancel' if operation == 'cancel' else 'bulk_stop' }}"

        - name: Execute bulk operation via API
          ansible.builtin.uri:
            url: "{{ foreman_server_url }}/foreman_tasks/api/tasks/{{ api_endpoint }}"
            method: POST
            user: "{{ foreman_username }}"
            password: "{{ foreman_password }}"
            force_basic_auth: true
            validate_certs: "{{ foreman_validate_certs | default(false) }}"
            body_format: json
            body:
              search: "{{ task_search_query }}"
              organization_id: "{{ foreman_organization | default(omit) }}"
            status_code: [200, 400]
          register: __bulk_operation_result

        - name: Show bulk operation result
          ansible.builtin.debug:
            msg:
              - "Status: {{ __bulk_operation_result.status }}"
              - "Response: {{ __bulk_operation_result.json | default(__bulk_operation_result.msg | default('N/A')) }}"

        - name: Verify operation result
          ansible.builtin.fail:
            msg: "Bulk {{ operation }} operation failed: {{ __bulk_operation_result.json | default(__bulk_operation_result.msg) }}"
          when:
            - __bulk_operation_result.status == 400
            - __bulk_operation_result.json is defined

    - name: No tasks to process
      ansible.builtin.debug:
        msg: "No pending tasks found matching the search criteria"
      when: __pending_tasks.resources | length == 0

    - name: Verify task cancellation/stop
      when: __pending_tasks.resources | length > 0
      block:
        - name: Set task ID search query
          ansible.builtin.set_fact:
            _task_ids_query: "id ^ ({{ __pending_tasks.resources | map(attribute='id') | join(',') }})"

        - name: Wait for tasks to react to cancellation
          ansible.builtin.pause:
            seconds: 30

        - name: Check if tasks are still pending
          theforeman.foreman.resource_info:
            resource: foreman_tasks
            search: "{{ _task_ids_query }} and state = running and result = pending"
          register: __still_pending_tasks

        - name: Force stop still-pending tasks
          when: __still_pending_tasks.resources | length > 0
          block:
            - name: Show tasks that ignored cancellation
              ansible.builtin.debug:
                msg: >-
                  {{ __still_pending_tasks.resources | length }} task(s) still pending after
                  {{ operation }}; attempting force stop

            - name: Force stop via bulk_stop
              ansible.builtin.uri:
                url: "{{ foreman_server_url }}/foreman_tasks/api/tasks/bulk_stop"
                method: POST
                user: "{{ foreman_username }}"
                password: "{{ foreman_password }}"
                force_basic_auth: true
                validate_certs: "{{ foreman_validate_certs | default(false) }}"
                body_format: json
                body:
                  search: "{{ _task_ids_query }} and state = running and result = pending"
                status_code: [200, 400]
              register: __force_stop_result

            - name: Show force stop result
              ansible.builtin.debug:
                msg: "{{ __force_stop_result.json | default(__force_stop_result.msg | default('N/A')) }}"

            - name: Wait for force stopped tasks to terminate
              ansible.builtin.pause:
                seconds: 60

            - name: Check if tasks are still pending after force stop
              theforeman.foreman.resource_info:
                resource: foreman_tasks
                search: "{{ _task_ids_query }} and state = running and result = pending"
              register: __still_pending_after_force

            - name: Show tasks still pending after force stop
              ansible.builtin.debug:
                msg: "{{ __still_pending_after_force.resources | length }} task(s) still pending after force stop"

            - name: Fail if tasks could not be stopped
              ansible.builtin.fail:
                msg: >-
                  {{ __still_pending_after_force.resources | length }} task(s) could not be stopped:
                  {{ __still_pending_after_force.resources | map(attribute='id') | join(', ') }}
              when: __still_pending_after_force.resources | length > 0

        - name: Stop orphaned per-host sub-tasks
          ansible.builtin.uri:
            url: "{{ foreman_server_url }}/foreman_tasks/api/tasks/bulk_stop"
            method: POST
            user: "{{ foreman_username }}"
            password: "{{ foreman_password }}"
            force_basic_auth: true
            validate_certs: "{{ foreman_validate_certs | default(false) }}"
            body_format: json
            body:
              search: "state = running and result = pending and label = \"Actions::RemoteExecution::RunHostJob\""
            status_code: [200, 400]
          register: __subtask_stop_result
          delegate_to: localhost

        - name: Show sub-task stop result
          ansible.builtin.debug:
            msg: "{{ __subtask_stop_result.json | default(__subtask_stop_result.msg | default('N/A')) }}"

        - name: Show final task states
          theforeman.foreman.resource_info:
            resource: foreman_tasks
            search: "{{ _task_ids_query }}"
          register: __tasks_after

        - name: Display final task states
          ansible.builtin.debug:
            msg:
              - "Task ID: {{ item.id }}"
              - "Current State: {{ item.state }}/{{ item.result }}"
          loop: "{{ __tasks_after.resources }}"
          loop_control:
            label: "Task {{ item.id }}"
