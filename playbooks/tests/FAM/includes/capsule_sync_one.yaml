---
- ansible.builtin.include_tasks: fire_and_wait_one.yaml
  vars:
    _url: "{{ _server_url }}/katello/api/capsules/{{ _capsule_id }}/content/sync"
    _body: >-
      {{ {'skip_metadata_check': true if mode | default('') == 'complete' else false,
          'validate_contents': true if mode | default('') == 'validate_contents' else false}
         | combine(_sync_target) }}
    _task_timeout: "{{ _sync_max_time }}"
    _delegate_to: localhost
