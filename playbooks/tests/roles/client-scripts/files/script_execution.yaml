---
- name: Execute script on content host
  hosts: all
  gather_facts: false

  tasks:
    - name: Execute script
      ansible.builtin.shell:
        cmd: |
          set -o pipefail

          script="{{ script | default('./' + task + '.sh') }}"
          log={{ task }}.log

          if [[ -f "$log" && ! -f "$log.orig" ]]; then
              cp -p "$log" "$log.orig"
          fi

          eval "$script" &>"$log"
          ret=$?

          echo '-' >>"$log"
          echo "Return code: $ret" >>"$log"
          echo '-----' >>"$log"

          cat "$log"
          exit $ret
      environment:
        TZ: UTC
      register: execution
      changed_when: true
      failed_when: false

    - name: Execute script - output
      ansible.builtin.debug:
        var: execution.stdout_lines
      # NOTE: must use execution.rc != 0, not 'execution is failed'.
      # failed_when: false on the shell task suppresses the failed flag permanently,
      # so 'is failed' always evaluates to False regardless of the actual exit code.
      # execution.rc reflects the real shell exit code and is unaffected by failed_when.
      failed_when:
        - execution.rc != 0

    - name: Calculate execution duration
      ansible.builtin.set_fact:
        exec_duration: >-
          {{ (execution.end | to_datetime('%Y-%m-%d %H:%M:%S.%f')).timestamp() -
             (execution.start | to_datetime('%Y-%m-%d %H:%M:%S.%f')).timestamp() }}

    - name: Execute script - timings
      ansible.builtin.debug:
        msg: >-
          Execute {{ task | default(script) }} {{ execution.start }} to {{ execution.end }}
          taking {{ exec_duration }} seconds
...
