---
- hosts: all
  gather_facts: false

  tasks:
    - name: Upload container_pull.sh to content host
      ansible.builtin.copy:
        src: /root/container_pull.sh
        dest: /root/container_pull.sh
        mode: '0500'

    - name: Upload and run skopeo login (< 6.18)
      when:
        - sat_version not in ['stream', 'foremanctl']
        - sat_version is version('6.18.0', '<')
      block:
        - name: Upload skopeo-login.sh to content host
          ansible.builtin.copy:
            src: /root/skopeo-login.sh
            dest: /root/skopeo-login.sh
            mode: '0500'

        - name: Log in to container registry
          ansible.builtin.shell:
            cmd: /root/skopeo-login.sh
          changed_when: true

    - name: Upload flatpak_install.sh to content host (>= 6.17)
      when:
        - sat_version in ['stream', 'foremanctl'] or sat_version is version('6.17.0', '>=')
      ansible.builtin.copy:
        src: /root/flatpak_install.sh
        dest: /root/flatpak_install.sh
        mode: '0500'
...
