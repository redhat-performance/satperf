---
- name: Set default variable(s) values
  ansible.builtin.set_fact:
    aks_list: "{{ aks | default('AK') | split }}"

- name: Assert that list of AKs is not empty
  ansible.builtin.assert:
    that:
      - aks_list | length > 0

