- name: Download host registration script from registration target
  ansible.builtin.get_url:
    url: "http://{{ tests_registration_target }}/pub/host-registration.{{ item }}.sh"
    dest: "/root/host-registration.{{ item }}.sh"
    mode: '0700'
    force: true
  loop: "{{ aks_list }}"

- name: Distribute content host registration related playbooks
  throttle: 8
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "/root/{{ item }}"
    mode: '0644'
    force: true
  loop:
    - host-registration_prepare.yaml
    - host-registration.yaml
    - script_execution_prepare.yaml
    - script_execution.yaml

- name: Distribute container_pull.sh
  ansible.builtin.template:
    src: container_pull.sh.j2
    dest: /root/container_pull.sh
    mode: '0700'
    force: true

- name: Distribute skopeo-login.sh (< 6.18)
  when:
    - sat_version not in ['stream', 'foremanctl']
    - sat_version is version('6.18.0', '<')
  ansible.builtin.template:
    src: skopeo-login.sh.j2
    dest: /root/skopeo-login.sh
    mode: '0700'
    force: true

- name: Distribute flatpak_install.sh (>= 6.17)
  when:
    - sat_version in ['stream', 'foremanctl'] or sat_version is version('6.17.0', '>=')
  ansible.builtin.template:
    src: flatpak_install.sh.j2
    dest: /root/flatpak_install.sh
    mode: '0700'
    force: true
...
