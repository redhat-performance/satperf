---
- name: "{{ task_name }} - Run insights-client via script_execution.yaml"
  ansible.builtin.shell:
    cmd: |
      set -o pipefail

      ansible-playbook \
        --private-key /root/id_rsa_key \
        --forks {{ size }} \
        --inventory {{ _concurrent_task_local_inventory }} \
        --extra-vars 'script="insights-client"' \
        --extra-vars 'task="insights-client"' \
        script_execution.yaml |
        tee {{ _concurrent_task_clients_yaml_cmd_base }}_insights-client.log
  changed_when: true
  failed_when: false
