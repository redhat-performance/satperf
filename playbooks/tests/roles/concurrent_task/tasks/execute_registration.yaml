---
- name: "{{ task_name }} - Run host-registration_prepare.yaml"
  ansible.builtin.shell:
    cmd: |
      set -o pipefail

      ansible-playbook \
        --private-key /root/id_rsa_key \
        --forks {{ num_retry_forks }} \
        --inventory {{ _concurrent_task_local_inventory }} \
        --extra-vars 'enable_iop={{ enable_iop }}' \
        host-registration_prepare.yaml |
        tee {{ _concurrent_task_clients_yaml_cmd_base }}_registration_prepare.log
  changed_when: true

- name: "{{ task_name }} - Run host-registration.yaml"
  ansible.builtin.shell:
    cmd: |
      set -o pipefail

      ansible-playbook \
        --private-key /root/id_rsa_key \
        --forks {{ size }} \
        --inventory {{ _concurrent_task_local_inventory }} \
        --extra-vars "task='{{ task_name }}'" \
        host-registration.yaml |
        tee {{ _concurrent_task_clients_yaml_cmd_base }}_registration.log
  changed_when: true
  failed_when: false
