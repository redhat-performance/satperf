---
- name: "{{ task_name }} - Run script_execution_prepare.yaml"
  ansible.builtin.shell:
    cmd: |
      set -o pipefail

      ansible-playbook \
        --private-key /root/id_rsa_key \
        --forks {{ size }} \
        --inventory {{ _concurrent_task_local_inventory }} \
        --extra-vars 'sat_version="{{ sat_version }}"' \
        script_execution_prepare.yaml |
        tee {{ _concurrent_task_clients_yaml_cmd_base }}_container_prepare.log
  changed_when: true

- name: "{{ task_name }} - Run container_pull.sh via script_execution.yaml"
  ansible.builtin.shell:
    cmd: |
      set -o pipefail

      ansible-playbook \
        --private-key /root/id_rsa_key \
        --forks {{ size }} \
        --inventory {{ _concurrent_task_local_inventory }} \
        --extra-vars "task='{{ task_name }}'" \
        script_execution.yaml |
        tee {{ _concurrent_task_clients_yaml_cmd_base }}_container_pull.log
  changed_when: true
  failed_when: false
